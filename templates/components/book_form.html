{% if editable %}
<div class="mb-3 position-relative">
    <label for="book-search">Search for a book</label>
    <input type="text"
           class="form-control"
           id="book-search"
           placeholder="Search by title or author..."
           hx-get="/books/search"
           hx-trigger="keyup changed delay:500ms"
           hx-target="#book-search-results"
           hx-swap="innerHTML"
           hx-include="[id='book-search']"
           name="q"
           autocomplete="off">
    <div id="book-search-results"
         class="position-absolute w-100"
         style="z-index: 1000;">
    </div>
</div>
{% endif %}
<form id="book-form"
      class="form">
    <div class="form-group">
        <label for="title">Title</label>
        <input type="text"
               {% if !editable %}disabled{% endif %}
               class="form-control"
               id="title"
               name="title"
               value="{{ book.title }}"
               hx-post="/books/{{ book.id }}"
               hx-swap="none"
               hx-trigger="keyup changed delay:1s"
               required>
    </div>
    <div class="form-group">
        <label for="author">Author</label>
        <input type="text"
               {% if !editable %}disabled{% endif %}
               class="form-control"
               id="author"
               name="author"
               value="{{ book.author }}"
               hx-post="/books/{{ book.id }}"
               hx-swap="none"
               hx-trigger="keyup changed delay:1s"
               required>
    </div>
    <div class="form-group">
        <label for="isbn10">ISBN 10</label>
        <input type="text"
               {% if !editable %}disabled{% endif %}
               class="form-control"
               id="isbn10"
               name="isbn10"
               value="{{ book.isbn10 }}"
               hx-post="/books/{{ book.id }}"
               hx-swap="none"
               hx-trigger="keyup changed delay:1s"
               required>
    </div>
    <div class="form-group">
        <label for="isbn13">ISBN 13</label>
        <input type="text"
               {% if !editable %}disabled{% endif %}
               class="form-control"
               id="isbn13"
               name="isbn13"
               value="{{ book.isbn13 }}"
               hx-post="/books/{{ book.id }}"
               hx-swap="none"
               hx-trigger="keyup changed delay:1s"
               required>
    </div>
</form>
