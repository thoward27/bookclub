{% extends "base.html" %}

{% block body %}
<div _="on every htmx:beforeSend toggle .d-none on #saving until htmx:afterOnLoad">
<form hx-post="/meetings/{{ meeting.id }}" {% if !editor %}hx-disable{% endif %}>
    <div class="form-group">
        <label for="location">Location</label>
        <input {% if !editor %}disabled{% endif %} type="text" class="form-control" id="location" name="location"
            value="{{ meeting.location }}" hx-post="/meetings/{{ meeting.id }}" hx-trigger="keyup changed delay:500ms"
        >
    </div>
    <div class="form-group">
        <label for="date">Date</label>
        {% set date = meeting.date.format("%Y-%m-%dT%H:%M") %}
        <input {% if !editor %}disabled{% endif %} type="datetime-local" class="form-control" id="date" name="date"
            value="{{ date }}" _="init call toLocaleTime('{{ meeting.date.to_rfc3339() }}') put it into my.value" hx-post="/meetings/{{ meeting.id }}" hx-trigger="change changed delay:500ms"
        >
        <input type="hidden" name="timezone" value="UTC" _="init call getLocalTimezone() put it into my.value">
    </div>
</form>
    <span id="saving" class="d-none">Saving</span>
</div>
{% endblock %}

{% block scripts %}
<script>
    function toLocaleTime(dateString) {
        let date = new Date(dateString)
        return `${date.getFullYear()}-${(date.getMonth() + 1).toString().padStart(2, '0')}-${date.getDate().toString().padStart(2, '0')}T${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`
    }
    function getLocalTimezone() {
        return Intl.DateTimeFormat().resolvedOptions().timeZone
    }
</script>
{% endblock %}
